{% if cart %}
<div class="card shadow-sm border-0 rounded-4 overflow-hidden">
    <div class="card-body p-3 p-md-4">

        <div class="d-flex justify-content-between align-items-center pb-3 mb-3 border-bottom">
            <span class="fw-bold fs-6">الإجمالي</span>
            <span class="fw-bold fs-5 text-dark">${{ totals.subtotal }}</span>
        </div>

        <div class="d-flex justify-content-between align-items-center pb-3 mb-3 border-bottom">
            <span class="text-muted">التكلفة</span>
            <span class="text-muted fw-semibold">${{ totals.total_cost }}</span>
        </div>

        <div class="d-flex justify-content-between align-items-center">
            <span class="fw-bold">الربح التقديري</span>
            <span class="fw-bold fs-6
                {% if totals.total_profit > 0 %}
                    text-success
                {% elif totals.total_profit < 0 %}
                    text-danger
                {% else %}
                    text-muted
                {% endif %}
            ">
                ${{ totals.total_profit }}
            </span>
        </div>

    </div>
</div>
{% endif %}
