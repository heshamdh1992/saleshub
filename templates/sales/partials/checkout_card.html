{% if cart %}
<div class="card shadow-sm border-0 pos-checkout-card rounded-4 overflow-hidden">
    <div class="card-header bg-white border-bottom py-3 px-4 d-flex justify-content-between align-items-center">
        <span class="fw-bold fs-6">إتمام البيع</span>
        <span id="offline-checkout-badge" class="badge bg-warning text-dark d-none">
            Checkout أوفلاين
        </span>
    </div>

    <div class="card-body p-3 p-md-4">
        <form method="post" action="{% url 'sales:checkout' %}" id="checkout-form">
            {% csrf_token %}

            <div class="border rounded-4 p-3 p-md-4 mb-4">
                <h3 class="h6 fw-bold mb-3">بيانات الدفع</h3>

                <div class="mb-3">
                    <label class="form-label fw-semibold">نوع الدفع</label>
                    <select name="payment_type" id="payment-type" class="form-select form-select-lg rounded-3">
                        <option value="cash">نقدي</option>
                        <option value="debt">دين</option>
                    </select>
                </div>

                <div class="mb-0">
                    <label class="form-label fw-semibold">عملة الدفع</label>
                    <select name="payment_currency" id="payment-currency" class="form-select form-select-lg rounded-3">
                        <option value="USD">USD</option>
                        <option value="SYP">SYP</option>
                        <option value="TRY">TRY</option>
                    </select>
                </div>
            </div>

            <div class="border rounded-4 p-3 p-md-4 mb-4">
                <h3 class="h6 fw-bold mb-3">التسوية والعميل</h3>

                <div class="mb-3">
                    <label class="form-label fw-semibold">الخصم</label>
                    <input
                        type="number"
                        step="0.01"
                        min="0"
                        name="discount_amount"
                        id="discount-amount"
                        class="form-control form-control-lg rounded-3"
                        value="0"
                    >
                    <small class="text-muted d-block mt-2">أدخل قيمة الخصم بالدولار المرجعي.</small>
                </div>

                <div class="mb-0" id="customer-wrapper">
                    <label class="form-label fw-semibold">العميل</label>
                    <select name="customer" id="customer-select" class="form-select form-select-lg rounded-3">
                        <option value="">-- اختر العميل --</option>
                        {% for customer in customers %}
                            <option value="{{ customer.pk }}">
                                {{ customer.name }} - {{ customer.phone|default:"-" }}
                            </option>
                        {% endfor %}
                    </select>
                    <small class="text-muted d-block mt-2">اختياري للنقدي، وإجباري للدين.</small>
                </div>
            </div>

            <div class="border rounded-4 p-3 p-md-4 mb-4">
                <h3 class="h6 fw-bold mb-3">ملاحظات إضافية</h3>

                <div class="mb-0">
                    <label class="form-label fw-semibold">ملاحظات</label>
                    <textarea name="notes" id="checkout-notes" class="form-control rounded-3" rows="2"></textarea>
                </div>
            </div>

            <div class="d-grid gap-2">
                <button type="submit" class="btn btn-dark btn-lg w-100 rounded-3" id="online-checkout-btn">
                    حفظ الفاتورة
                </button>

                <button type="button" class="btn btn-warning btn-lg w-100 rounded-3 d-none" id="offline-checkout-btn">
                    حفظ بيع نقدي أوفلاين
                </button>
            </div>
        </form>
    </div>
</div>
{% endif %}
