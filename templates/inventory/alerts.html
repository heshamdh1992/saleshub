{% extends "base.html" %}

{% block title %}العملاء{% endblock %}

{% block content %}

<div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3 mb-4">
    <div>
        <h1 class="h3 fw-bold mb-1">العملاء</h1>
        <p class="text-muted mb-0">إدارة العملاء والبحث السريع ضمن قاعدة البيانات</p>
    </div>
    <div>
        <a href="{% url 'customers:add' %}" class="btn btn-dark px-4 rounded-3">
            إضافة عميل
        </a>
    </div>
</div>

<div class="card shadow-sm border-0 rounded-4 mb-4">
    <div class="card-body p-3 p-md-4">
        <form method="get">
            <label for="customer-search" class="form-label fw-semibold mb-2">بحث</label>
            <input
                id="customer-search"
                type="text"
                name="q"
                value="{{ query }}"
                class="form-control form-control-lg rounded-3"
                placeholder="ابحث بالاسم أو الهاتف">
        </form>
    </div>
</div>

<div class="card shadow-sm border-0 rounded-4 overflow-hidden">
    <div class="card-header bg-white border-bottom py-3 px-4">
        <div class="row text-muted small fw-semibold">
            <div class="col-7 col-md-6">اسم العميل</div>
            <div class="col-5 col-md-4">الهاتف</div>
            <div class="d-none d-md-block col-md-2 text-end">عرض</div>
        </div>
    </div>

    <div class="card-body p-0">
        {% for c in customers %}
            <a href="{% url 'customers:detail' c.pk %}" class="text-decoration-none text-dark">
                <div class="border-bottom px-4 py-3 customer-row">
                    <div class="row align-items-center g-2">
                        <div class="col-7 col-md-6">
                            <div class="fw-semibold">{{ c.name }}</div>
                        </div>
                        <div class="col-5 col-md-4 text-muted">
                            {{ c.phone|default:"-" }}
                        </div>
                        <div class="d-none d-md-block col-md-2 text-end">
                            <span class="btn btn-outline-dark btn-sm rounded-3 px-3 disabled">
                                عرض
                            </span>
                        </div>
                    </div>
                </div>
            </a>
        {% empty %}
            <div class="p-5 text-center text-muted">
                لا يوجد عملاء
            </div>
        {% endfor %}
    </div>
</div>

<style>
    .customer-row {
        transition: background-color 0.2s ease;
    }

    .customer-row:hover {
        background-color: #f8f9fa;
    }
</style>

{% endblock %}
